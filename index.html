<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Visualizer</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #020b18;
}

canvas {
  display: block;
}

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

button {
  margin: 5px;
  padding: 8px 12px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="controls">
  <button data-mode="0">Wave</button>
  <button data-mode="1">Mandala</button>
  <button id="start">Mic</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();


// =====================
// 🖼 IMAGE (FACE)
// =====================
const faceImg = new Image();
faceImg.src = "scream.jpg";


// =====================
// 🎧 AUDIO
// =====================
let analyser, dataArray;
let running = false;
let mode = 0;

document.getElementById("start").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 4096;

  source.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);
  running = true;
};


// mode switch
document.querySelectorAll("button[data-mode]").forEach(btn=>{
  btn.onclick = ()=> mode = Number(btn.dataset.mode);
});


// =====================
// SMOOTH VALUES
// =====================
let sBass = 0, sTreble = 0, sRMS = 0;


// =====================
// MAIN LOOP
// =====================
function render(t=0){
  requestAnimationFrame(render);

  ctx.fillStyle = "rgba(2,11,24,0.25)";
  ctx.fillRect(0,0,W,H);

  // 🎧 audio
  if(running && analyser){
    analyser.getByteFrequencyData(dataArray);

    let bass = dataArray.slice(0,80).reduce((a,b)=>a+b,0)/80/255;
    let treble = dataArray.slice(500,1200).reduce((a,b)=>a+b,0)/700/255;

    sBass = sBass*0.85 + bass*0.15;
    sTreble = sTreble*0.85 + treble*0.15;
    sRMS = (sBass + sTreble) / 2;
  }

  // 🌊 DRAW SHAPES FIRST (UNDER FACE)
  drawWave(t);

  // 🖼 FACE LAST (ON TOP)
  if(faceImg.complete){
    ctx.drawImage(faceImg, 0, 0, W, H);
  }
}

render();


// =====================
// 🌊 WAVE SHAPES (NEW STYLE)
// =====================
function drawWave(t){

  let centerY = H/2;

  ctx.beginPath();

  for(let x = 0; x < W; x += 5){

    // wave movement (audio driven)
    let wave =
      Math.sin(x * 0.01 + t*0.002 + sBass*6) * 80 +
      Math.sin(x * 0.02 + t*0.001 + sTreble*8) * 40;

    let y = centerY + wave;

    if(x === 0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.strokeStyle = `rgba(255,100,200,0.8)`;
  ctx.lineWidth = 2 + sRMS * 6;
  ctx.stroke();


  // second mirrored wave (gives depth)
  ctx.beginPath();

  for(let x = 0; x < W; x += 5){

    let wave =
      Math.sin(x * 0.015 + t*0.002 - sBass*6) * 120 +
      Math.cos(x * 0.01 + t*0.003 + sTreble*5) * 50;

    let y = centerY + wave;

    if(x === 0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.strokeStyle = `rgba(100,200,255,0.6)`;
  ctx.lineWidth = 1 + sRMS * 4;
  ctx.stroke();
}
</script>

</body>
</html>

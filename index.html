<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Visualizer Fixed</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}

canvas {
  display: block;
}

#start {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  padding: 10px 14px;
  background: transparent;
  color: white;
  border: 1px solid white;
  cursor: pointer;
}
</style>
</head>

<body>

<button id="start">Start Mic</button>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});


// =====================
// 🖼 IMAGE (FACE)
// =====================
const faceImg = new Image();
faceImg.src = "scream.jpg";

faceImg.onload = () => {
  console.log("Image loaded ✔");
};

faceImg.onerror = () => {
  console.log("Image NOT found ❌ check file name/path");
};


// =====================
// 🎧 AUDIO
// =====================
let analyser, dataArray;
let running = false;

document.getElementById("start").onclick = async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioCtx.createMediaStreamSource(stream);

    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;

    source.connect(analyser);

    dataArray = new Uint8Array(analyser.frequencyBinCount);

    running = true;

    console.log("Mic ON ✔");
  } catch (err) {
    console.log("Mic error:", err);
  }
};


// =====================
// SMOOTH VALUES
// =====================
let bass = 0;
let treble = 0;
let energy = 0;


// =====================
// DRAW LOOP
// =====================
function draw(t = 0) {
  requestAnimationFrame(draw);

  // background fade (IMPORTANT)
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0, 0, W, H);

  // ALWAYS draw waves (even without mic)
  let fakeBass = Math.sin(t * 0.002) * 0.5 + 0.5;
  let fakeTreble = Math.cos(t * 0.003) * 0.5 + 0.5;

  let b = fakeBass;
  let tr = fakeTreble;

  // real audio override
  if (running && analyser) {
    analyser.getByteFrequencyData(dataArray);

    let low = 0, high = 0;

    for (let i = 0; i < dataArray.length; i++) {
      if (i < 80) low += dataArray[i];
      if (i > 200 && i < 800) high += dataArray[i];
    }

    b = low / 80 / 255;
    tr = high / 600 / 255;
  }

  bass = bass * 0.85 + b * 0.15;
  treble = treble * 0.85 + tr * 0.15;
  energy = (bass + treble) / 2;

  // 🌊 WAVES (UNDER FACE)
  drawWaves(t);

  // 🖼 FACE (ON TOP)
  if (faceImg.complete && faceImg.naturalWidth > 0) {
    ctx.drawImage(faceImg, 0, 0, W, H);
  }
}

requestAnimationFrame(draw);


// =====================
// 🌊 WAVE SYSTEM (FIXED + STRONG VISIBILITY)
// =====================
function drawWaves(t) {

  let centerY = H / 2;

  ctx.beginPath();

  for (let x = 0; x < W; x += 4) {

    let wave =
      Math.sin(x * 0.01 + t * 0.002 + bass * 8) * 90 +
      Math.cos(x * 0.02 + t * 0.003 + treble * 10) * 60;

    let y = centerY + wave;

    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.strokeStyle = `rgba(0,200,255,${0.4 + energy})`;
  ctx.lineWidth = 2 + energy * 6;
  ctx.stroke();


  // second wave layer (depth)
  ctx.beginPath();

  for (let x = 0; x < W; x += 6) {

    let wave =
      Math.sin(x * 0.015 + t * 0.002 - bass * 6) * 120 +
      Math.cos(x * 0.01 + t * 0.003 + treble * 8) * 70;

    let y = centerY + wave;

    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.strokeStyle = `rgba(255,100,200,${0.3 + energy})`;
  ctx.lineWidth = 1 + energy * 5;
  ctx.stroke();
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Visualizer</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&family=Playfair+Display:wght@400;700&display=swap');

body {
  margin: 0;
  overflow: hidden;
  background: #020b18;
  font-family: 'Space Grotesk', sans-serif;
}

h1 {
  position: fixed;
  top: 20px;
  left: 20px;
  color: rgba(255,255,255,0.7);
  font-family: 'Playfair Display', serif;
}

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
}

button {
  margin: 5px;
  padding: 8px 12px;
  border: 1px solid rgba(255,255,255,0.4);
  background: transparent;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>VOICE VISUALIZER</h1>

<canvas id="c"></canvas>

<div id="controls">
  <button data-mode="0">Lissajous</button>
  <button data-mode="1">Mandala</button>
  <button id="start">Activate Mic</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();


// =====================
// 🎨 BACKGROUND IMAGE
// =====================
const bgImg = new Image();
bgImg.src = "scream.jpg"; 
// 👉 put image in same folder OR change path


// =====================
// 🎧 AUDIO SETUP
// =====================
let analyser, dataArray;
let running = false;
let mode = 0;

document.getElementById("start").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 4096;
  analyser.smoothingTimeConstant = 0.85;

  source.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  running = true;
};


// =====================
// MODE SWITCH
// =====================
document.querySelectorAll("button[data-mode]").forEach(btn => {
  btn.onclick = () => mode = Number(btn.dataset.mode);
});


// =====================
// SMOOTH VALUES
// =====================
let sRMS = 0, sBass = 0, sTreble = 0;
let sHue = 200;


// =====================
// MAIN LOOP
// =====================
function render(t = 0) {
  requestAnimationFrame(render);

  // 🌄 draw background image
  if (bgImg.complete) {
    ctx.drawImage(bgImg, 0, 0, W, H);
  }

  // 🌫 fade layer (keeps trails)
  ctx.fillStyle = "rgba(2,11,24,0.2)";
  ctx.fillRect(0, 0, W, H);


  // 🎧 audio analysis
  if (running && analyser) {
    analyser.getByteFrequencyData(dataArray);

    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];

    let rms = sum / dataArray.length / 255;

    let bass = dataArray.slice(0, 80).reduce((a,b)=>a+b,0)/80/255;
    let treble = dataArray.slice(600, 1200).reduce((a,b)=>a+b,0)/600/255;

    const sm = 0.15;

    sRMS = sRMS*(1-sm) + rms*sm*5;
    sBass = sBass*(1-sm) + bass*sm*4;
    sTreble = sTreble*(1-sm) + treble*sm*4;

    let targetHue = 160 + sTreble * 200;
    sHue = sHue * 0.85 + targetHue * 0.15;
  }


  // 🎨 draw visuals
  if (mode === 0) drawLissajous(t);
  if (mode === 1) drawMandala(t);
}

render();


// =====================
// LISSAJOUS MODE
// =====================
function drawLissajous(t) {
  ctx.beginPath();

  let cx = W / 2;
  let cy = H / 2;

  for (let i = 0; i < 300; i++) {
    let a = i / 300 * Math.PI * 2;

    let x = cx + Math.sin(a * (2 + sBass*3)) * 220;
    let y = cy + Math.sin(a * (3 + sTreble*3) + t*0.002) * 220;

    i === 0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y);
  }

  ctx.strokeStyle = `hsl(${sHue},90%,60%)`;
  ctx.lineWidth = 2 + sRMS * 6;
  ctx.stroke();
}


// =====================
// MANDALA MODE
// =====================
function drawMandala(t) {
  let cx = W / 2;
  let cy = H / 2;

  let petals = Math.round(6 + sTreble * 12);

  for (let i = 0; i < petals; i++) {
    let angle = i / petals * Math.PI * 2 + t * 0.001;
    let len = 120 + sBass * 250;

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(
      cx + Math.cos(angle) * len,
      cy + Math.sin(angle) * len
    );

    let intensity = Math.min(sRMS * 1.5, 1);

    ctx.strokeStyle = `rgb(
      255,
      ${255 - intensity * 255},
      ${255 - intensity * 255}
    )`;

    ctx.lineWidth = 2 + sRMS * 6;
    ctx.stroke();
  }
}
</script>

</body>
</html>

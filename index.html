<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voice Wave Visualizer</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #020b18;
}

canvas {
  display: block;
}

#controls {
  position: fixed;
  bottom: 20px;
  left: 20px;
  z-index: 10;
}

button {
  margin: 5px;
  padding: 8px 12px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<div id="controls">
  <button id="start">Start Mic</button>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();


// =====================
// 🖼 FACE IMAGE
// =====================
const faceImg = new Image();
faceImg.src = "scream.jpg"; // put in same folder


// =====================
// 🎧 AUDIO SETUP
// =====================
let analyser, dataArray;
let running = false;

document.getElementById("start").onclick = async () => {
  const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
  const audioCtx = new AudioContext();
  const source = audioCtx.createMediaStreamSource(stream);

  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 4096;

  source.connect(analyser);

  dataArray = new Uint8Array(analyser.frequencyBinCount);

  running = true;
};


// =====================
// SMOOTH AUDIO VALUES
// =====================
let bass = 0;
let treble = 0;
let energy = 0;


// =====================
// MAIN LOOP
// =====================
function render(t = 0) {
  requestAnimationFrame(render);

  // 🌫 soft fade for trails
  ctx.fillStyle = "rgba(2,11,24,0.25)";
  ctx.fillRect(0, 0, W, H);

  // 🎧 audio update
  if (running && analyser) {
    analyser.getByteFrequencyData(dataArray);

    let low = 0;
    let high = 0;

    for (let i = 0; i < dataArray.length; i++) {
      if (i < 80) low += dataArray[i];
      if (i > 500 && i < 1200) high += dataArray[i];
    }

    low = low / 80 / 255;
    high = high / 700 / 255;

    bass = bass * 0.85 + low * 0.15;
    treble = treble * 0.85 + high * 0.15;
    energy = (bass + treble) / 2;
  }

  // 🌊 draw waves FIRST (behind face)
  drawWaves(t);

  // 🖼 draw face LAST (on top)
  if (faceImg.complete) {
    ctx.drawImage(faceImg, 0, 0, W, H);
  }
}

render();


// =====================
// 🌊 ORGANIC WAVE SYSTEM
// =====================
function drawWaves(t) {

  let centerY = H / 2;

  // MAIN WAVE
  ctx.beginPath();

  for (let x = 0; x < W; x += 4) {

    let wave =
      Math.sin(x * 0.01 + t * 0.002 + bass * 6) * 80 +
      Math.sin(x * 0.02 + t * 0.001 + treble * 10) * 50;

    let y = centerY + wave;

    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.strokeStyle = "rgba(255,120,200,0.8)";
  ctx.lineWidth = 2 + energy * 6;
  ctx.stroke();


  // SECOND LAYER WAVE (depth)
  ctx.beginPath();

  for (let x = 0; x < W; x += 6) {

    let wave =
      Math.cos(x * 0.015 + t * 0.002 - bass * 5) * 120 +
      Math.sin(x * 0.01 + t * 0.003 + treble * 8) * 60;

    let y = centerY + wave;

    if (x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.strokeStyle = "rgba(80,200,255,0.6)";
  ctx.lineWidth = 1 + energy * 4;
  ctx.stroke();
}
</script>

</body>
</html>
